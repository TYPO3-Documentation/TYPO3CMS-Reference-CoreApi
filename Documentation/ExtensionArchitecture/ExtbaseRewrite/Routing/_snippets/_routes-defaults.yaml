routeEnhancers:
    ConferencesPlugin:
        type: Extbase
        limitToPages:
            - 'page["module"] == "conferences"'
        extension: MyExtension
        plugin: Conferences
        defaultController: 'Conference::list'
        routes:
            - routePath: '/'
              _controller: 'Conference::list'
            - routePath: '/page/{page}'
              _controller: 'Conference::list'
              _arguments:
                  page: currentPage
            - routePath: '/{conference_slug}'
              _controller: 'Conference::show'
              _arguments:
                  conference_slug: conference
        defaults:
            page: '1'
        requirements:
            page: '\d+'
        aspects:
            page:
                type: StaticRangeMapper
                start: '1'
                end: '100'
            conference_slug:
                type: PersistedAliasMapper
                tableName: tx_myextension_domain_model_conference
                routeFieldName: slug
